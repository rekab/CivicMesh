# Minimal known-good config used by tests/apply/test_renderers.py.
# Pinned values; do not source from anywhere else (config.toml.example
# could drift). Mirrors the example file's defaults so renders match
# what setup_ap.sh would produce for an equivalent config.
#
# db_path is required by load_config but unused by any renderer (no
# render_*() function consumes it), so the goldens in goldens/minimal/
# remain byte-identical regardless of this value.
db_path = "/tmp/civicmesh-renderer-test.db"

[node]
site_name = "CivicMesh"
callsign = "civic1"

[network]
ip = "10.0.0.1"
subnet_cidr = "10.0.0.0/24"
iface = "wlan0"
country_code = "US"
dhcp_range_start = "10.0.0.10"
dhcp_range_end = "10.0.0.250"
dhcp_lease = "15m"

[ap]
ssid = "CivicMesh-Messages"
channel = 6

[radio]
serial_port = "/dev/serial/by-id/usb-test"
freq_mhz = 910.525
bw_khz = 62.5
sf = 7
cr = 5

[channels]
names = ["#civicmesh"]

[web]
port = 8080
portal_aliases = ["civicmesh.internal"]

[logging]
log_dir = "logs"
log_level = "WARNING"
